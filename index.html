<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="height=device-height, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />

    <link rel="apple-touch-icon" sizes="144x144" href="apple-touch-icon.png">

    <title>Play It By Trust (Sky Blue Super Mario Bros.)</title>

    <!-- CSS stylesheet(s) -->
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <!-- <link rel="stylesheet" type="text/css" href="assets/css/style.css" /> -->

    <!-- Libraries -->
    <script src="js/lib/jsnes.min.js"></script>
</head>

<body>
    <div id="nes">
        <div id="clicktostart">
            <h1>Play It By Trust (Sky Blue Super Mario Bros.)</h1>
            <div id="controls">
                <h2>Controls</h2>
                <ul>
                    <li>ENTER = Start</li>
                    <li>ARROW KEYS = Movement</li>
                    <li>X = A button (jump, swim)</li>
                    <li>Z = B button (run, fireballs)</li>
                </ul>
            </div>
            <hr>
            <h2><span id="clickaction">Click</span> to start. (Mobile not supported)</h2>
        </div>
    </div>


    <!-- FOR PIPPINBARR.COM -->

    <script src="js/main.js"></script>
